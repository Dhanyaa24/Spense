<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spense - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
    <style>
        :root {
            --savory-sage: #818263;
            --avocado-smoothie: #C2C395;
            --blush-beet: #DDBAAE;
            --peach-protein: #EFD7CF;
            --honey-oatmilk: #F6EAD4;
            --coconut-cream: #FFFAF2;
            --dark-text: #2d2d2d;
            --light-text: #5a5a5a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: var(--coconut-cream);
        }

        /* Left side */
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, var(--savory-sage) 0%, #6d6e52 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .left-side::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--avocado-smoothie) 0%, transparent 70%);
            opacity: 0.3;
        }
        .brand-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 3rem;
        }
        .brand-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 4.2rem;
            font-style: italic;
            color: var(--coconut-cream);
            margin-bottom: 1rem;
        }
        .brand-tagline {
            font-size: 1.1rem;
            opacity: 0.85;
            font-weight: 300;
        }

        /* Right side */
        .right-side {
            flex: 1;
            background: #fffaf2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .form-container {
            width: 100%;
            max-width: 450px;
        }

        .page-heading {
            font-family: 'DM Serif Display', serif;
            font-size: 3rem;
            font-style: italic;
            color: var(--savory-sage);
            margin-bottom: 0.5rem;
            margin-top: 2rem;
        }

        .subtitle {
            color: var(--light-text);
            margin-bottom: 2rem;
            font-size: 1rem;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 500;
            color: var(--dark-text);
            font-size: 0.95rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #c2c395;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            color: var(--dark-text);
            background: white;
        }

        input::placeholder { color: var(--light-text); opacity: 0.5; }
        input:focus {
            outline: none;
            border-color: var(--savory-sage);
            box-shadow: 0 0 0 3px rgba(129, 130, 99, 0.1);
        }

        /* Password strength bar */
        .strength-bar-wrap {
            margin-top: 0.6rem;
            height: 5px;
            background: var(--honey-oatmilk);
            border-radius: 5px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .strength-label {
            font-size: 0.78rem;
            margin-top: 4px;
            color: var(--light-text);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--savory-sage);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 24px rgba(129, 130, 99, 0.3);
            margin-top: 0.5rem;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(129, 130, 99, 0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--light-text);
            font-size: 0.95rem;
        }
        .back-link a { color: var(--savory-sage); font-weight: 600; text-decoration: none; }
        .back-link a:hover { opacity: 0.7; }

        .message {
            padding: 1rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .message.error { background: rgba(244,67,54,0.1); border: 2px solid rgba(244,67,54,0.3); color: #d32f2f; }
        .message.success { background: rgba(76,175,80,0.1); border: 2px solid rgba(76,175,80,0.3); color: #388e3c; }
        .hidden { display: none; }

        /* Success state */
        .success-state {
            text-align: center;
            padding: 2rem 0;
        }
        .checkmark {
            width: 72px;
            height: 72px;
            background: var(--savory-sage);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        @media (max-width: 968px) {
            body { flex-direction: column; }
            .left-side { flex: 0; min-height: 180px; }
            .brand-logo { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="left-side">
        <div class="brand-content">
            <div class="brand-logo">Spense</div>
            <div class="brand-tagline">Your money, simplified</div>
        </div>
    </div>

    <div class="right-side">
        <div class="form-container">
            <div id="message" class="message hidden"></div>

            <!-- Reset form -->
            <div id="resetForm">
                <h1 class="page-heading">New password</h1>
                <p class="subtitle">Choose a strong password for your account.</p>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="At least 6 characters" oninput="checkStrength(this.value)">
                    <div class="strength-bar-wrap">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your new password">
                </div>

                <button class="submit-btn" id="resetBtn" onclick="submitReset()">
                    Update Password
                </button>

                <div class="back-link">
                    <a href="login.html">← Back to login</a>
                </div>
            </div>

            <!-- Success state -->
            <div id="successState" class="hidden success-state">
                <div class="checkmark">
                    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                        <path d="M10 18 L16 24 L26 13" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1 class="page-heading" style="margin-top:0;">Password updated!</h1>
                <p class="subtitle" style="margin-bottom:2rem;">Your password has been successfully changed. You can now log in with your new password.</p>
                <a href="login.html">
                    <button class="submit-btn">Go to Login →</button>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Get token from URL
        const params = new URLSearchParams(window.location.search);
        const resetToken = params.get('token');

        if (!resetToken) {
            document.getElementById('message').textContent = 'Invalid or missing reset link. Please request a new one.';
            document.getElementById('message').className = 'message error';
            document.getElementById('resetForm').classList.add('hidden');
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }

        function checkStrength(val) {
            const bar = document.getElementById('strengthBar');
            const label = document.getElementById('strengthLabel');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const levels = [
                { pct: '0%', color: 'transparent', text: '' },
                { pct: '25%', color: '#EF5350', text: 'Weak' },
                { pct: '50%', color: '#FFA726', text: 'Fair' },
                { pct: '75%', color: '#C2C395', text: 'Good' },
                { pct: '100%', color: '#818263', text: 'Strong' },
            ];
            const lvl = levels[Math.min(strength, 4)];
            bar.style.width = lvl.pct;
            bar.style.background = lvl.color;
            label.textContent = val.length > 0 ? lvl.text : '';
        }

        async function submitReset() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            if (!password || password.length < 6) {
                return showMessage('Password must be at least 6 characters.', 'error');
            }
            if (password !== confirm) {
                return showMessage('Passwords do not match.', 'error');
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const res = await fetch(`${API_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('resetForm').classList.add('hidden');
                    document.getElementById('message').className = 'message hidden';
                    document.getElementById('successState').classList.remove('hidden');
                } else {
                    showMessage(data.message || 'Reset failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Update Password';
                }
            } catch (err) {
                showMessage('Network error. Is the server running?', 'error');
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }
    </script>
</body>
</html>
