<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spense - Your Money, Simplified</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="theme.js"></script>
    <style>
        :root {
            --savory-sage: #818263;
            --avocado-smoothie: #C2C395;
            --blush-beet: #DDBAAE;
            --peach-protein: #EFD7CF;
            --oat-latte: #DCD4C1;
            --honey-oatmilk: #F6EAD4;
            --coconut-cream: #FFFAF2;
            --dark-text: #2d2d2d;
            --light-text: #5a5a5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--coconut-cream);
            color: var(--dark-text);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            background: rgba(255, 250, 242, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--honey-oatmilk);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        nav .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--savory-sage);
            font-style: italic;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--light-text);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--savory-sage);
        }

        .nav-links a.login-btn {
            padding: 0.7rem 1.8rem;
            background: var(--savory-sage);
            color: white;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            text-decoration: none;
            display: inline-block;
        }

        .nav-links a.login-btn:hover {
            background: #6d6e52;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(129, 130, 99, 0.3);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 6rem 5% 4rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--peach-protein) 0%, transparent 70%);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--avocado-smoothie) 0%, transparent 70%);
            opacity: 0.3;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(50px, 50px) rotate(5deg);
            }
        }

        .hero .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 4.5rem;
            line-height: 1.1;
            color: var(--savory-sage);
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .hero h1 .highlight {
            font-style: italic;
            color: var(--blush-beet);
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--light-text);
            line-height: 1.7;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .cta-button {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: var(--savory-sage);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            box-shadow: 0 8px 24px rgba(129, 130, 99, 0.3);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .cta-button:hover::before {
            width: 400px;
            height: 400px;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(129, 130, 99, 0.4);
        }

        /* Illustration Container */
        .illustration-container {
            position: relative;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .illustration-svg {
            width: 100%;
            max-width: 500px;
            height: auto;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.1));
        }

        /* Floating elements animation */
        @keyframes floatSlow {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes floatMedium {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(5deg);
            }
        }

        @keyframes floatFast {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .float-1 {
            animation: floatSlow 6s ease-in-out infinite;
        }

        .float-2 {
            animation: floatMedium 5s ease-in-out infinite;
        }

        .float-3 {
            animation: floatFast 4s ease-in-out infinite;
        }

        .piggy-bank {
            animation: floatSlow 5s ease-in-out infinite;
        }

        .coin {
            animation: floatMedium 3s ease-in-out infinite;
        }

        .plant {
            animation: floatFast 7s ease-in-out infinite;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero .container {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero h1 {
                font-size: 3.5rem;
            }

            .nav-links {
                gap: 1.5rem;
            }

            .illustration-svg {
                max-width: 400px;
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.8rem;
            }

            .hero p {
                font-size: 1.1rem;
            }

            .nav-links a:not(.login-btn) {
                display: none;
            }

            .illustration-svg {
                max-width: 350px;
            }
        }

        /* Page transition */
        @keyframes slideOutLeft {
            0% {
                transform: translateX(0);
                opacity: 1;
            }

            100% {
                transform: translateX(-100%);
                opacity: 0;
            }
        }

        body.slide-out-left {
            animation: slideOutLeft 0.5s ease forwards;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav>
        <div class="container">
            <div class="logo">Spense</div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="login.html" class="login-btn">Get Started</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>
                    Your money,<br>
                    <span class="highlight">simplified</span>
                </h1>
                <p>
                    Build better money habits with Spense. Track expenses, set goals,
                    and take control of your financial future—all designed for students like you.
                </p>
                <a href="login.html" class="cta-button">Get Started Free</a>
            </div>

            <!-- Hand-drawn Style Illustration -->
            <div class="illustration-container">
                <svg class="illustration-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background circle -->
                    <circle cx="250" cy="250" r="200" fill="#F6EAD4" opacity="0.3" />

                    <!-- Money Plant in Pot -->
                    <g class="plant">
                        <!-- Pot -->
                        <path d="M180 380 L170 420 L230 420 L220 380 Z" fill="#C2C395" stroke="#818263" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <ellipse cx="200" cy="380" rx="25" ry="8" fill="#DCD4C1" stroke="#818263" stroke-width="2" />

                        <!-- Stem -->
                        <path d="M200 380 Q195 350 200 320" stroke="#818263" stroke-width="4" fill="none"
                            stroke-linecap="round" />

                        <!-- Leaves with dollar signs -->
                        <ellipse cx="185" cy="340" rx="20" ry="30" fill="#C2C395" stroke="#818263" stroke-width="2"
                            transform="rotate(-30 185 340)" />
                        <text x="181" y="347" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
                            fill="#818263">$</text>

                        <ellipse cx="215" cy="330" rx="20" ry="30" fill="#DDBAAE" stroke="#818263" stroke-width="2"
                            transform="rotate(20 215 330)" />
                        <text x="211" y="337" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
                            fill="#818263">$</text>

                        <ellipse cx="190" cy="310" rx="22" ry="32" fill="#EFD7CF" stroke="#818263" stroke-width="2"
                            transform="rotate(-15 190 310)" />
                        <text x="185" y="318" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
                            fill="#818263">$</text>
                    </g>

                    <!-- Piggy Bank -->
                    <g class="piggy-bank">
                        <!-- Body -->
                        <ellipse cx="320" cy="280" rx="60" ry="45" fill="#DDBAAE" stroke="#818263" stroke-width="3" />

                        <!-- Head -->
                        <ellipse cx="370" cy="265" rx="30" ry="28" fill="#EFD7CF" stroke="#818263" stroke-width="3" />

                        <!-- Snout -->
                        <ellipse cx="395" cy="270" rx="12" ry="10" fill="#C2C395" stroke="#818263" stroke-width="2" />
                        <circle cx="392" cy="268" r="2" fill="#818263" />
                        <circle cx="392" cy="274" r="2" fill="#818263" />

                        <!-- Eye -->
                        <circle cx="365" cy="258" r="4" fill="#818263" />

                        <!-- Ear -->
                        <path d="M360 245 Q355 235 365 238" stroke="#818263" stroke-width="2" fill="#EFD7CF" />

                        <!-- Legs -->
                        <rect x="295" y="315" width="10" height="20" rx="5" fill="#C2C395" stroke="#818263"
                            stroke-width="2" />
                        <rect x="320" y="315" width="10" height="20" rx="5" fill="#C2C395" stroke="#818263"
                            stroke-width="2" />
                        <rect x="345" y="315" width="10" height="20" rx="5" fill="#C2C395" stroke="#818263"
                            stroke-width="2" />

                        <!-- Coin slot -->
                        <rect x="310" y="265" width="25" height="4" rx="2" fill="#818263" />

                        <!-- Tail -->
                        <path d="M260 275 Q250 270 255 260" stroke="#818263" stroke-width="3" fill="none"
                            stroke-linecap="round" />
                    </g>

                    <!-- Floating Coins -->
                    <g class="coin float-1">
                        <circle cx="150" cy="180" r="25" fill="#F6EAD4" stroke="#818263" stroke-width="3" />
                        <text x="140" y="192" font-family="Arial, sans-serif" font-size="24" font-weight="bold"
                            fill="#818263">$</text>
                    </g>

                    <g class="coin float-2">
                        <circle cx="380" cy="150" r="20" fill="#DCD4C1" stroke="#818263" stroke-width="3" />
                        <text x="372" y="160" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
                            fill="#818263">$</text>
                    </g>

                    <g class="coin float-3">
                        <circle cx="430" cy="320" r="18" fill="#DDBAAE" stroke="#818263" stroke-width="2" />
                        <text x="423" y="329" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
                            fill="#818263">$</text>
                    </g>

                    <!-- Wallet -->
                    <g class="float-1">
                        <rect x="100" y="340" width="60" height="45" rx="5" fill="#C2C395" stroke="#818263"
                            stroke-width="3" />
                        <rect x="100" y="340" width="60" height="15" rx="5" fill="#DDBAAE" stroke="#818263"
                            stroke-width="3" />
                        <line x1="130" y1="340" x2="130" y2="355" stroke="#818263" stroke-width="2" />

                        <!-- Money sticking out -->
                        <rect x="110" y="320" width="40" height="25" rx="2" fill="#F6EAD4" stroke="#818263"
                            stroke-width="2" />
                        <line x1="115" y1="330" x2="145" y2="330" stroke="#818263" stroke-width="1"
                            stroke-dasharray="2,2" />
                        <text x="120" y="337" font-family="Arial, sans-serif" font-size="12" font-weight="bold"
                            fill="#818263">$$$</text>
                    </g>

                    <!-- Chart/Graph -->
                    <g class="float-2">
                        <rect x="380" y="380" width="80" height="60" rx="5" fill="#FFFAF2" stroke="#818263"
                            stroke-width="3" />

                        <!-- Bars going up -->
                        <rect x="390" y="420" width="8" height="10" fill="#DDBAAE" />
                        <rect x="403" y="410" width="8" height="20" fill="#C2C395" />
                        <rect x="416" y="400" width="8" height="30" fill="#818263" />
                        <rect x="429" y="390" width="8" height="40" fill="#818263" />

                        <!-- Arrow going up -->
                        <path d="M445 405 L450 395 L455 405" stroke="#818263" stroke-width="2" fill="none"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <line x1="450" y1="395" x2="450" y2="425" stroke="#818263" stroke-width="2" />
                    </g>

                    <!-- Stars/Sparkles -->
                    <g fill="#818263">
                        <path d="M250 100 L252 105 L257 107 L252 109 L250 114 L248 109 L243 107 L248 105 Z"
                            opacity="0.6" />
                        <path d="M420 220 L422 224 L426 226 L422 228 L420 232 L418 228 L414 226 L418 224 Z"
                            opacity="0.6" />
                        <path d="M140 250 L141 253 L144 254 L141 255 L140 258 L139 255 L136 254 L139 253 Z"
                            opacity="0.6" />
                        <path d="M90 150 L92 154 L96 156 L92 158 L90 162 L88 158 L84 156 L88 154 Z" opacity="0.6" />
                    </g>
                </svg>
            </div>
        </div>
    </section>

    <script>
        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Page transition when navigating to login
        document.querySelectorAll('a[href="login.html"]').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                document.body.classList.add('slide-out-left');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 500);
            });
        });
    </script>
</body>

</html>
