<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spense - Profile Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
    <style>
        :root {
            --savory-sage: #818263;
            --avocado-smoothie: #C2C395;
            --blush-beet: #DDBAAE;
            --peach-protein: #EFD7CF;
            --oat-latte: #DCD4C1;
            --honey-oatmilk: #F6EAD4;
            --coconut-cream: #FFFAF2;
            --dark-text: #2d2d2d;
            --light-text: #5a5a5a;
            --want-red: #EF5350;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--coconut-cream);
            color: var(--dark-text);
            min-height: 100vh;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--peach-protein) 0%, transparent 70%);
            opacity: 0.35;
            z-index: 0;
            animation: floatBg 20s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--avocado-smoothie) 0%, transparent 70%);
            opacity: 0.2;
            z-index: 0;
            animation: floatBg 25s ease-in-out infinite reverse;
        }
        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* Top Navigation */
        .top-nav {
            background: rgba(255, 250, 242, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 10px rgba(129, 130, 99, 0.08);
            border-bottom: 1px solid var(--honey-oatmilk);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: var(--savory-sage);
            font-weight: 400;
        }
        .nav-right {
            position: relative;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .profile-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--savory-sage) 0%, #6d6e52 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Settings Container */
        .settings-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 3rem auto;
            background: rgba(255, 250, 242, 0.92);
            border: 1px solid var(--honey-oatmilk);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(129, 130, 99, 0.08);
            padding: 3rem;
        }

        .settings-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2.5rem;
            color: var(--savory-sage);
            margin-bottom: 2rem;
            text-align: center;
            font-style: italic;
        }

        /* Profile Photo Editor */
        .photo-editor {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .photo-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--honey-oatmilk);
            border: 3px solid var(--savory-sage);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--savory-sage);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .photo-preview:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(129, 130, 99, 0.2);
        }
        .photo-edit-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(45, 45, 45, 0.7);
            color: white;
            padding: 0.2rem 0;
            font-size: 0.8rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .photo-preview:hover .photo-edit-overlay { opacity: 1; }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-weight: 500;
            color: var(--dark-text);
            font-size: 0.95rem;
        }

        .form-input, .form-select {
            padding: 0.8rem 1rem;
            border: 2px solid var(--honey-oatmilk);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--dark-text);
            background: var(--coconut-cream);
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--savory-sage);
            box-shadow: 0 0 0 3px rgba(129, 130, 99, 0.1);
        }

        .btn-primary {
            grid-column: 1 / -1;
            padding: 1rem;
            background: var(--savory-sage);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .btn-primary:hover {
            background: #6d6e52;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(129, 130, 99, 0.2);
        }

        .theme-alert {
            grid-column: 1 / -1;
            padding: 1rem;
            background: rgba(194, 195, 149, 0.2);
            border: 1px dashed var(--avocado-smoothie);
            border-radius: 10px;
            color: var(--savory-sage);
            font-size: 0.9rem;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-logo">Spense</div>
        <div class="nav-right">
            <div class="profile-icon" id="profileIcon" onclick="openProfile()">S</div>
            <!-- Profile Dropdown -->
            <div id="profileDropdown" style="display:none;position:absolute;right:0;top:55px;background:var(--coconut-cream);border:1px solid var(--honey-oatmilk);border-radius:12px;box-shadow:0 8px 30px rgba(129,130,99,0.15);padding:0.5rem;min-width:220px;z-index:200;display:none;flex-direction:column;gap:0.2rem;">
                <div style="padding:0.8rem;border-bottom:1px solid var(--honey-oatmilk);margin-bottom:0.5rem;">
                    <div style="font-weight:600;color:var(--savory-sage);font-size:1.1rem;" id="profileName">User</div>
                    <div style="font-size:0.8rem;color:var(--light-text);" id="profileEmail">user@email.com</div>
                </div>
                <a href="home.html" style="padding:0.6rem 0.8rem; text-decoration:none; color:var(--dark-text); font-weight:500; border-radius:8px; transition:0.2s; display:flex; align-items:center; gap:0.5rem;" onmouseover="this.style.background='var(--honey-oatmilk)'" onmouseout="this.style.background='transparent'">Home</a>
                <a href="dashboard.html" style="padding:0.6rem 0.8rem; text-decoration:none; color:var(--dark-text); font-weight:500; border-radius:8px; transition:0.2s; display:flex; align-items:center; gap:0.5rem;" onmouseover="this.style.background='var(--honey-oatmilk)'" onmouseout="this.style.background='transparent'">Dashboard</a>
                <a href="track.html" style="padding:0.6rem 0.8rem; text-decoration:none; color:var(--dark-text); font-weight:500; border-radius:8px; transition:0.2s; display:flex; align-items:center; gap:0.5rem;" onmouseover="this.style.background='var(--honey-oatmilk)'" onmouseout="this.style.background='transparent'">Expenses</a>
                <a href="profile_settings.html" style="padding:0.6rem 0.8rem; text-decoration:none; color:var(--dark-text); font-weight:500; border-radius:8px; transition:0.2s; display:flex; align-items:center; gap:0.5rem; background:var(--honey-oatmilk);">Profile Settings</a>
                <a href="settings.html" style="padding:0.6rem 0.8rem; text-decoration:none; color:var(--dark-text); font-weight:500; border-radius:8px; transition:0.2s; display:flex; align-items:center; gap:0.5rem;" onmouseover="this.style.background='var(--honey-oatmilk)'" onmouseout="this.style.background='transparent'">Settings</a>
                <button onclick="logout()" style="width:100%;padding:0.6rem;margin-top:0.5rem;background:var(--want-red);color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;transition:0.2s;">Logout</button>
            </div>
        </div>
    </div>

    <div class="settings-container">
        <h2 class="settings-title">Profile Settings</h2>

        <form id="profileSettingsForm" onsubmit="saveProfileSettings(event)">
            <div class="photo-editor">
                <div class="photo-preview" onclick="document.getElementById('photoInput').click()">
                    <span id="photoInitial">S</span>
                    <img id="photoImg" src="" alt="Profile">
                    <div class="photo-edit-overlay">Edit</div>
                </div>
                <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="userName" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address (Read-only)</label>
                    <input type="email" class="form-input" id="userEmail" disabled style="background:#efefef; cursor:not-allowed;">
                </div>

                <div class="form-group">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" class="form-input" id="userDob">
                </div>

                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <select class="form-select" id="userGender">
                        <option value="">Select...</option>
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                        <option value="non-binary">Non-binary</option>
                        <option value="prefer-not-to-say">Prefer not to say</option>
                    </select>
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-input" id="userPhone" placeholder="+91 9876543210">
                </div>

                <div class="theme-alert">
                    Your settings are beautifully synced. The doodle theme has been applied globally!
                </div>

                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>

    <script>
        function getUser() {
            try { return JSON.parse(localStorage.getItem('user')); } catch { return null; }
        }

        function initData() {
            const user = getUser();
            if(!user) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('userName').value = user.name || '';
            document.getElementById('userEmail').value = user.email || '';
            
            document.getElementById('profileName').textContent = user.name || 'User';
            document.getElementById('profileEmail').textContent = user.email || '';
            document.getElementById('profileIcon').textContent = (user.name || 'U').charAt(0).toUpperCase();
            document.getElementById('photoInitial').textContent = (user.name || 'U').charAt(0).toUpperCase();

            // Load saved settings if any locally
            const extras = JSON.parse(localStorage.getItem('user_extras_' + user.email)) || {};
            if(extras.dob) document.getElementById('userDob').value = extras.dob;
            if(extras.gender) document.getElementById('userGender').value = extras.gender;
            if(extras.phone) document.getElementById('userPhone').value = extras.phone;
            if(extras.photo) {
                document.getElementById('photoImg').src = extras.photo;
                document.getElementById('photoImg').style.display = 'block';
                document.getElementById('photoInitial').style.display = 'none';
            }
        }

        function openProfile() {
            const dd = document.getElementById('profileDropdown');
            dd.style.display = dd.style.display === 'flex' ? 'none' : 'flex';
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.nav-right')) {
                document.getElementById('profileDropdown').style.display = 'none';
            }
        });

        function handlePhotoUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const img = document.getElementById('photoImg');
                    img.src = evt.target.result;
                    img.style.display = 'block';
                    document.getElementById('photoInitial').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProfileSettings(e) {
            e.preventDefault();
            const user = getUser();
            const extras = {
                dob: document.getElementById('userDob').value,
                gender: document.getElementById('userGender').value,
                phone: document.getElementById('userPhone').value,
                photo: document.getElementById('photoImg').src
            };
            
            localStorage.setItem('user_extras_' + user.email, JSON.stringify(extras));
            
            // Also update main user name
            user.name = document.getElementById('userName').value;
            localStorage.setItem('user', JSON.stringify(user));
            
            alert('Settings saved successfully!');
            initData();
        }

        window.onload = initData;
    </script>
</body>
</html>
